articles: []
url: https://www.rayimage.dev

reference:
  - title: "Colorspace Transformations"
    desc: "Functions for converting and adjusting image color spaces."
    contents:
      - render_color_correction
      - render_convert_colorspace
      - render_gamma_linear
      - render_to_display
      - render_white_balance
  - title: "Whole Image Size Transformations"
    desc: "Functions for cropping, resizing, rotating, and resampling images."
    contents:
      - render_crop
      - render_padding
      - render_reorient
      - render_resized
      - interpolate_array
  - title: "Pixel-Level Transformations"
    desc: "Functions for per-pixel and neighborhood-based image effects."
    contents:
      - render_bokeh
      - render_boolean_distance
      - render_bw
      - render_clamp
      - render_convolution
      - render_convolution_fft
      - render_exposure
      - render_tonemap
      - render_vibrance
      - render_vignette
  - title: "Image Combining Transformations"
    desc: "Functions for compositing, stacking, and adding image/text overlays."
    contents:
      - render_alpha_outline
      - render_image_overlay
      - render_sprite_overlay
      - render_stack
      - render_text_image
      - render_title
  - title: "Plotting and Saving Images"
    desc: "Functions for displaying/saving images"
    contents:
      - starts_with("plot")
      - starts_with("ray_write")
      - starts_with("ray_read")
  - title: "Colorspace Helpers"
    desc: "Prebuilt RGB Working/Display Color Spaces."
    contents:
      - starts_with("CS")
  - title: "Calculating Font Info"
    desc: "Functions for extracting size information about strings"
    contents:
      - starts_with("get_string")
  - title: "Kernels"
    desc: "Functions to generate 2D distributions"
    contents:
      - starts_with("generate")
  - title: "Included Data"
    desc: "Example data/depth map."
    contents:
      - starts_with("dragon")
      - starts_with("sunset")
  - title: "S3 Methods"
    desc: "rayimg class functions"
    contents:
      - ends_with("rayimg")
  - title: "Deprecated Functions"
    desc: "Use the render_* versions instead."
    contents:
      - starts_with("add")
